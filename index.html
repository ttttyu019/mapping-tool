<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考勤数据本地脱敏工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .content {
            padding: 30px;
        }

        .upload-section {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 60px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
            background: #f8f9ff;
        }

        .upload-section:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-section.dragover {
            border-color: #764ba2;
            background: #e0e7ff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 18px;
            color: #666;
            margin-bottom: 10px;
        }

        .upload-hint {
            font-size: 14px;
            color: #999;
        }

        #fileInput {
            display: none;
        }

        .config-section {
            display: none;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .field-config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .field-card {
            background: #f8f9ff;
            border: 2px solid #e0e7ff;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .field-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .field-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .field-sample {
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
            padding: 8px;
            background: white;
            border-radius: 6px;
            font-family: monospace;
        }

        .mask-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .mask-option {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .mask-option input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 239, 125, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .preview-section {
            display: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 12px 24px;
            background: #e0e7ff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .table-container {
            overflow-x: auto;
            border: 1px solid #e0e7ff;
            border-radius: 10px;
            max-height: 500px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            position: sticky;
            top: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            z-index: 10;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #e0e7ff;
            white-space: nowrap;
        }

        th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        tbody tr:hover {
            background: #f8f9ff;
        }

        .masked-cell {
            background: #fff3cd;
            color: #856404;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .file-info {
            background: #e0f2f1;
            border-left: 4px solid #009688;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .file-info-text {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .file-info-name {
            font-weight: 600;
            color: #00695c;
        }

        .file-info-size {
            color: #666;
            font-size: 14px;
        }

        .file-info-actions button {
            margin-left: 10px;
            padding: 8px 16px;
            font-size: 13px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-message {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .success-message::before {
            content: "✓";
            font-size: 20px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .field-config-grid {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 考勤数据本地脱敏工具</h1>
            <p>安全、快速、本地处理 | 数据不离开您的电脑</p>
        </div>

        <div class="content">
            <!-- 上传区域 -->
            <div class="upload-section" id="uploadSection">
                <div class="upload-icon">📁</div>
                <div class="upload-text">拖拽文件到这里，或点击选择文件</div>
                <div class="upload-hint">支持 Excel (.xlsx, .xls) 和 CSV 文件</div>
                <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
            </div>

            <!-- 文件信息 -->
            <div class="file-info" id="fileInfo" style="display: none;">
                <div class="file-info-text">
                    <span class="file-info-name" id="fileName">文件名.xlsx</span>
                    <span class="file-info-size" id="fileSize">0 KB</span>
                </div>
                <div class="file-info-actions">
                    <button class="btn btn-secondary" id="resetBtn">重新上传</button>
                </div>
            </div>

            <!-- 配置区域 -->
            <div class="config-section" id="configSection">
                <h2 class="section-title">🎯 配置脱敏规则</h2>

                <div class="stats" id="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="totalRows">0</div>
                        <div class="stat-label">总记录数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalColumns">0</div>
                        <div class="stat-label">字段数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="maskedFields">0</div>
                        <div class="stat-label">待脱敏字段</div>
                    </div>
                </div>

                <div class="field-config-grid" id="fieldConfigGrid">
                    <!-- 字段配置卡片将在这里动态生成 -->
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary" id="previewBtn">👁️ 预览脱敏效果</button>
                    <button class="btn btn-success" id="exportBtn">📥 导出脱敏数据</button>
                </div>
            </div>

            <!-- 预览区域 -->
            <div class="preview-section" id="previewSection">
                <h2 class="section-title">📊 数据预览</h2>

                <div class="success-message" id="successMessage">
                    数据已成功脱敏处理！
                </div>

                <div class="tabs">
                    <button class="tab active" id="tabOriginal">原始数据</button>
                    <button class="tab" id="tabMasked">脱敏后数据</button>
                </div>

                <div class="table-container">
                    <table id="dataTable">
                        <thead></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- 加载动画 -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在处理数据...</p>
            </div>
        </div>
    </div>

    <!-- 引入 SheetJS 用于处理 Excel 文件 -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <script>
        // 全局状态
        let rawData = [];
        let headers = [];
        let file = null;
        let fieldConfigs = {};
        let maskedData = [];

        // DOM 元素
        const uploadSection = document.getElementById('uploadSection');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const resetBtn = document.getElementById('resetBtn');
        const configSection = document.getElementById('configSection');
        const fieldConfigGrid = document.getElementById('fieldConfigGrid');
        const previewSection = document.getElementById('previewSection');
        const previewBtn = document.getElementById('previewBtn');
        const exportBtn = document.getElementById('exportBtn');
        const dataTable = document.getElementById('dataTable');
        const loading = document.getElementById('loading');
        const successMessage = document.getElementById('successMessage');
        const tabOriginal = document.getElementById('tabOriginal');
        const tabMasked = document.getElementById('tabMasked');

        // 事件监听
        uploadSection.addEventListener('click', () => fileInput.click());
        uploadSection.addEventListener('dragover', handleDragOver);
        uploadSection.addEventListener('dragleave', handleDragLeave);
        uploadSection.addEventListener('drop', handleDrop);
        fileInput.addEventListener('change', handleFileSelect);
        resetBtn.addEventListener('click', resetAll);
        previewBtn.addEventListener('click', showPreview);
        exportBtn.addEventListener('click', exportData);
        tabOriginal.addEventListener('click', () => switchTab('original'));
        tabMasked.addEventListener('click', () => switchTab('masked'));

        // 拖拽处理
        function handleDragOver(e) {
            e.preventDefault();
            uploadSection.classList.add('dragover');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            uploadSection.classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            uploadSection.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                processFile(files[0]);
            }
        }

        // 文件选择
        function handleFileSelect(e) {
            const files = e.target.files;
            if (files.length > 0) {
                processFile(files[0]);
            }
        }

        // 处理文件
        function processFile(selectedFile) {
            file = selectedFile;
            const extension = file.name.split('.').pop().toLowerCase();

            // 显示文件信息
            uploadSection.style.display = 'none';
            fileInfo.style.display = 'flex';
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);

            loading.style.display = 'block';

            const reader = new FileReader();

            if (extension === 'csv') {
                reader.onload = (e) => {
                    parseCSV(e.target.result);
                };
                reader.readAsText(file);
            } else {
                reader.onload = (e) => {
                    parseExcel(e.target.result);
                };
                reader.readAsArrayBuffer(file);
            }
        }

        // 解析 CSV
        function parseCSV(content) {
            const lines = content.split('\n');
            if (lines.length === 0) {
                alert('文件为空');
                return;
            }

            headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            rawData = [];

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line) {
                    const values = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
                    const row = {};
                    headers.forEach((header, index) => {
                        row[header] = values[index] || '';
                    });
                    rawData.push(row);
                }
            }

            initializeConfig();
        }

        // 解析 Excel
        function parseExcel(buffer) {
            const workbook = XLSX.read(buffer, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });

            if (jsonData.length === 0) {
                alert('文件为空');
                return;
            }

            headers = jsonData[0];
            rawData = [];

            for (let i = 1; i < jsonData.length; i++) {
                const row = {};
                headers.forEach((header, index) => {
                    row[header] = jsonData[i][index] || '';
                });
                rawData.push(row);
            }

            initializeConfig();
        }

        // 初始化配置界面
        function initializeConfig() {
            loading.style.display = 'none';
            configSection.style.display = 'block';

            // 更新统计信息
            document.getElementById('totalRows').textContent = rawData.length;
            document.getElementById('totalColumns').textContent = headers.length;
            updateMaskedFieldsCount();

            // 生成字段配置卡片
            fieldConfigGrid.innerHTML = '';
            fieldConfigs = {};

            headers.forEach(header => {
                const sampleValue = rawData[0][header] || '(无数据)';
                fieldConfigs[header] = { mask: 'none' };

                const card = document.createElement('div');
                card.className = 'field-card';
                card.innerHTML = `
                    <div class="field-name">${header}</div>
                    <div class="field-sample">示例: ${sampleValue}</div>
                    <div class="mask-options">
                        <label class="mask-option">
                            <input type="radio" name="mask_${header}" value="none" checked>
                            <span>不脱敏</span>
                        </label>
                        <label class="mask-option">
                            <input type="radio" name="mask_${header}" value="partial">
                            <span>部分脱敏 (保留首尾)</span>
                        </label>
                        <label class="mask-option">
                            <input type="radio" name="mask_${header}" value="full">
                            <span>完全脱敏 (全替换)</span>
                        </label>
                        <label class="mask-option">
                            <input type="radio" name="mask_${header}" value="hash">
                            <span>哈希脱敏 (不可逆)</span>
                        </label>
                    </div>
                `;

                fieldConfigGrid.appendChild(card);

                // 绑定事件
                const radios = card.querySelectorAll('input[type="radio"]');
                radios.forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        fieldConfigs[header].mask = e.target.value;
                        updateMaskedFieldsCount();
                    });
                });
            });
        }

        // 更新脱敏字段计数
        function updateMaskedFieldsCount() {
            const count = Object.values(fieldConfigs).filter(config => config.mask !== 'none').length;
            document.getElementById('maskedFields').textContent = count;
        }

        // 应用脱敏
        function applyMasking() {
            maskedData = rawData.map(row => {
                const maskedRow = {};
                headers.forEach(header => {
                    const config = fieldConfigs[header];
                    const value = row[header];

                    if (config.mask === 'none') {
                        maskedRow[header] = value;
                    } else if (config.mask === 'partial') {
                        maskedRow[header] = maskPartial(value);
                    } else if (config.mask === 'full') {
                        maskedRow[header] = maskFull(value);
                    } else if (config.mask === 'hash') {
                        maskedRow[header] = maskHash(value);
                    }
                });
                return maskedRow;
            });
        }

        // 部分脱敏 (保留首尾)
        function maskPartial(value) {
            const str = String(value);
            if (str.length <= 2) return '*'.repeat(str.length);
            const keep = Math.max(1, Math.floor(str.length / 4));
            return str.substring(0, keep) + '*'.repeat(str.length - keep * 2) + str.substring(str.length - keep);
        }

        // 完全脱敏
        function maskFull(value) {
            return '*'.repeat(String(value).length);
        }

        // 哈希脱敏
        function maskHash(value) {
            let hash = 0;
            const str = String(value);
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return 'H' + Math.abs(hash).toString(36).toUpperCase();
        }

        // 显示预览
        function showPreview() {
            loading.style.display = 'block';
            previewSection.style.display = 'none';

            setTimeout(() => {
                applyMasking();
                renderTable('original');
                loading.style.display = 'none';
                previewSection.style.display = 'block';
                successMessage.style.display = 'flex';
            }, 300);
        }

        // 切换标签页
        function switchTab(tab) {
            tabOriginal.classList.remove('active');
            tabMasked.classList.remove('active');

            if (tab === 'original') {
                tabOriginal.classList.add('active');
                renderTable('original');
            } else {
                tabMasked.classList.add('active');
                renderTable('masked');
            }
        }

        // 渲染表格
        function renderTable(type) {
            const data = type === 'original' ? rawData : maskedData;
            const thead = dataTable.querySelector('thead');
            const tbody = dataTable.querySelector('tbody');

            // 渲染表头
            thead.innerHTML = '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>';

            // 渲染表体 (最多显示 100 行)
            const displayData = data.slice(0, 100);
            tbody.innerHTML = displayData.map(row => {
                return '<tr>' + headers.map(header => {
                    const value = row[header] || '';
                    const isMasked = type === 'masked' && fieldConfigs[header].mask !== 'none';
                    return `<td class="${isMasked ? 'masked-cell' : ''}">${value}</td>`;
                }).join('') + '</tr>';
            }).join('');
        }

        // 导出数据
        function exportData() {
            if (maskedData.length === 0) {
                applyMasking();
            }

            // 创建工作表
            const ws = XLSX.utils.json_to_sheet(maskedData);

            // 创建工作簿
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '脱敏数据');

            // 生成文件名
            const originalName = file.name.replace(/\.[^/.]+$/, '');
            const newName = `${originalName}_脱敏.xlsx`;

            // 下载
            XLSX.writeFile(wb, newName);

            successMessage.style.display = 'flex';
            successMessage.textContent = `✓ 文件已导出: ${newName}`;
        }

        // 重置
        function resetAll() {
            file = null;
            rawData = [];
            headers = [];
            fieldConfigs = {};
            maskedData = [];

            uploadSection.style.display = 'block';
            fileInfo.style.display = 'none';
            configSection.style.display = 'none';
            previewSection.style.display = 'none';
            fileInput.value = '';
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
    </script>
</body>
</html>
